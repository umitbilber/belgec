name: Build Release Zip

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Release versiyonunu çıkar
        id: versiyon
        run: |
          # refs/tags/v1.0.3 → 1.0.3
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release versiyonu: $VERSION"

      - name: config/app.php'deki version'u güncelle
        run: |
          VERSION="${{ steps.versiyon.outputs.version }}"
          sed -i "s/'version' => '[^']*'/'version' => '$VERSION'/" config/app.php
          echo "config/app.php güncellendi:"
          grep "version" config/app.php

      - name: Build klasörü hazırla
        run: |
          mkdir -p build
          cp -r app build/
          cp -r config build/
          cp -r migrations build/
          cp -r phpmailer build/
          cp -r public build/
          cp -r routes build/
          cp -r vendor build/
          cp composer.json build/
          cp composer.lock build/
          cp migrate.php build/
          cp guncelleme-uygula.php build/

          if [ -f .htaccess ]; then cp .htaccess build/; fi

          mkdir -p build/storage/backups
          mkdir -p build/storage/cache
          mkdir -p build/storage/logs
          touch build/storage/backups/.gitkeep
          touch build/storage/cache/.gitkeep
          touch build/storage/logs/.gitkeep

      - name: Zip oluştur
        run: |
          cd build
          zip -r ../belgec.zip . -x "*.DS_Store" "*Thumbs.db"
          cd ..
          ls -lh belgec.zip

      - name: Release'e yükle
        uses: softprops/action-gh-release@v2
        with:
          files: belgec.zip
