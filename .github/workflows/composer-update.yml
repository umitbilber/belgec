name: Composer Install

on:
  push:
    paths:
      - 'composer.json'
      - '.github/workflows/composer-update.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: composer-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  composer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, gmp, openssl, curl, bcmath
          tools: composer:v2

      - name: Composer Update
        run: composer update --no-dev --optimize-autoloader --no-interaction

      - name: Commit vendor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vendor composer.lock
          if git diff --staged --quiet; then
            echo "Değişiklik yok, push atlanıyor"
            exit 0
          fi
          git commit -m "vendor: composer update sonrası güncellendi"
          git push origin HEAD:${{ github.ref_name }}
